<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">OTA Fleet Diagnostics Lab architecture</title>
  <desc id="desc">Browser dashboard calls a FastAPI boundary, which coordinates an immutable simulator service and SQLite repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071019"/><stop offset="1" stop-color="#0d1a25"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-opacity=".25"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0 9 3 0 6Z" fill="#1f9dff"/></marker>
  </defs>
  <rect width="1400" height="500" rx="24" fill="url(#bg)"/>
  <text x="70" y="72" fill="#f2f7fb" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="700">System architecture</text>
  <text x="70" y="108" fill="#9fb0bf" font-family="Inter,Segoe UI,sans-serif" font-size="17">One local process, deterministic transitions, durable diagnostic evidence</text>
  <g filter="url(#shadow)" font-family="Inter,Segoe UI,sans-serif">
    <g transform="translate(70 180)"><rect width="260" height="190" rx="14" fill="#0f1c27" stroke="#2b3d4c"/><circle cx="48" cy="48" r="20" fill="#102f45" stroke="#1f9dff"/><path d="M37 48h22M48 37v22" stroke="#1f9dff" stroke-width="3"/><text x="30" y="100" fill="#f2f7fb" font-size="21" font-weight="650">Browser dashboard</text><text x="30" y="133" fill="#9fb0bf" font-size="15">Accessible local UI</text><text x="30" y="160" fill="#9fb0bf" font-size="15">No CDN or cloud account</text></g>
    <g transform="translate(400 180)"><rect width="260" height="190" rx="14" fill="#0f1c27" stroke="#2b3d4c"/><circle cx="48" cy="48" r="20" fill="#102f45" stroke="#1f9dff"/><path d="M36 42h24M36 49h24M36 56h16" stroke="#1f9dff" stroke-width="3"/><text x="30" y="100" fill="#f2f7fb" font-size="21" font-weight="650">FastAPI boundary</text><text x="30" y="133" fill="#9fb0bf" font-size="15">Pydantic validation</text><text x="30" y="160" fill="#9fb0bf" font-size="15">Security + rate-limit headers</text></g>
    <g transform="translate(730 180)"><rect width="260" height="190" rx="14" fill="#0f1c27" stroke="#2b3d4c"/><circle cx="48" cy="48" r="20" fill="#102f45" stroke="#1f9dff"/><path d="m36 49 8 8 17-19" fill="none" stroke="#46d681" stroke-width="3"/><text x="30" y="100" fill="#f2f7fb" font-size="21" font-weight="650">Simulator service</text><text x="30" y="133" fill="#9fb0bf" font-size="15">Immutable state machine</text><text x="30" y="160" fill="#9fb0bf" font-size="15">Fault + rollback policies</text></g>
    <g transform="translate(1060 180)"><rect width="260" height="190" rx="14" fill="#0f1c27" stroke="#2b3d4c"/><ellipse cx="48" cy="39" rx="20" ry="9" fill="#102f45" stroke="#1f9dff"/><path d="M28 39v22c0 5 9 9 20 9s20-4 20-9V39M28 50c0 5 9 9 20 9s20-4 20-9" fill="none" stroke="#1f9dff" stroke-width="2"/><text x="30" y="100" fill="#f2f7fb" font-size="21" font-weight="650">SQLite repository</text><text x="30" y="133" fill="#9fb0bf" font-size="15">Controller snapshots</text><text x="30" y="160" fill="#9fb0bf" font-size="15">Ordered diagnostic events</text></g>
  </g>
  <g fill="none" stroke="#1f9dff" stroke-width="3" marker-end="url(#arrow)"><path d="M340 275h48"/><path d="M670 275h48"/><path d="M1000 275h48"/></g>
  <text x="700" y="442" text-anchor="middle" fill="#6f8495" font-family="Inter,Segoe UI,sans-serif" font-size="14">Simulated firmware behavior only — no real vehicle hardware or production signing keys</text>
</svg>
