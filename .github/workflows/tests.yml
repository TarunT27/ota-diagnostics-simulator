name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m playwright install --with-deps chromium
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy ota_simulator
      - run: python -m pytest --browser chromium --cov=ota_simulator --cov-branch --cov-report=term-missing --cov-report=xml
      - run: pip-audit

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag ota-diagnostics-simulator:test .
